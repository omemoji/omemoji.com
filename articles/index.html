をよく参考にする","画材: Krita, CLIP STUDIO PAINT, Inkscapeなど","テーマ: 特にこだわりはないが、龍や鳥の作品が多いかもしれない","好きなアーティスト: カラヴァッジョ、葛飾北斎、ミューラー=ブロックマン、大竹亮峯、山本茜など","今後描いてみたいもの: 楽曲のアートワーク、漫画、上手い絵","一応作曲をしたことがある→","https:\u002F\u002Fwww.youtube.com\u002Fchannel\u002FUCe1R2Wcu50u9Nm_HkZO6llA","YouTube","ゲーム音楽をよく聞く","東方Project、Toby Foxの楽曲など","YouTube Musicで良いと思ったものをつまみ食いして聞いている","久石譲、YMO、花譜、米津玄師、ARB、サカナクションなど","楽器は特に弾けない","別途記事にするかもしれない","井上雄彦『スラムダンク』","宮崎駿『風の谷のナウシカ』","野田サトル『ゴールデンカムイ』","福本伸行『銀と金』","浦沢直樹『MASTERキートン』","岩明均『寄生獣』","細野不二彦『ギャラリーフェイク』","山下和美『天才柳沢教授の生活』","こうの史代『夕凪の街　桜の国』\nなど","markdown","content","md","ubuntu-server-を普段使いしてみよう","Ubuntu Server を普段使いしてみよう","img","\u002Fimages\u002Fcontent\u002Fubuntu_i3\u002Fubuntu_i3_01.png",720,405,"私は Ubuntu "," を普段使いしている。「サーバ用のものを普段使い出来るのか」と疑問に思うかもしれないが、意外にもデスクトップ用としても使い勝手がよかったのでここに紹介したい。","i3 ベースのデスクトップ環境","Repository: ","(optional) dotfiles: ","Installation","\n1. ","https:\u002F\u002Fubuntu.com\u002Fdownload\u002Fserver","Get and install Ubuntu Server 22.04 on your computer","br","\n2. ","Window manager","i3","Launcher","i3-dmenu-desktop","Input method (Japanese)","Fcitx5 and Mozc","Sound","PipeWire (AAC codec)","Terminal","rxvt-unicode","Google Chrome","Mailer","Thunderbird","Visual Studio Code","File manager","Thunar","Image viewer","Ristoretto","PDF viewer","Evince","Media player","VLC","Image editor","GIMP, Inkscape","Application(CUI)","Shell","zsh","w3m","Vim, Neovim","File Manager","Ranger","「軽量で自由度の高い」デスクトップ環境といえば、ある程度 Linux に慣れ親しんだ人は「Arch Linux を使えばいいのではないか」と考えるかもしれない。\nまた、パッケージ管理に apt を使いたいという場合は","https:\u002F\u002Fdebian.org","Debian"," (デスクトップ環境なしでのインストールが可能)","https:\u002F\u002Fxubuntu.org\u002F","Xubuntu","、","https:\u002F\u002Flubuntu.me","Lubuntu"," (Ubuntu ベース、軽量デスクトップ環境)","https:\u002F\u002Fregolith-linux.org\u002F","Regolith Linux"," (Ubuntu ベース、i3 をウィンドウマネージャとして用いる)","も候補として挙げられるだろう。しかしながら、Ubuntu Server をあえて GUI 環境で使うことには以下のメリットがある:","Arch Linux よりも環境構築が楽","Arch Linux よりもパッケージが安定している","Debian よりもパッケージが新しい上、場合によっては ppa で最新のアプリも入れられる","Ubuntu ベースのディストリビューションよりも入れられるアプリの自由度が高いため、余計なものが最初から入っているということがない","Regolith Linux よりもロゴがかっこいい (個人差あり)","まとめると、「自分で 1 から欲しいアプリだけを入れたいが、時々最新のアプリも入れつつ安定した環境を作りたい」人に向いていると言える。","coins (筑波大学情報学群情報科学類)のような geek community では Linux を使っている人は珍しくなく、Arch Linux を Thinkpad に入れるだけでは逆に没個性になりがちである。そこで、一見 Linux の中では beginner 向けに見える Ubuntu を使った上で「これ、実は Ubuntu "," なんですよ」と言うことで、どうせ初心者だろうと高をくくっていた相手に「一味違う」と思わせることが出来るのではないだろうか。","快適。その一言に尽きる。","私の場合は i3 をウィンドウマネージャとして用いているが、アイドル状態で消費メモリが 1GB に達しないというのがまず素晴らしい。また、","大量のタブを開きながら","npm run dev","で開発環境を開く","Krita (OSS の高機能お絵描きアプリ) で絵を描きつつ動画も見る","というような高負荷の運用をしても、消費メモリが 8GB を超えることは殆どない。動作も素早く、ストレスフリーな生活を送る上で確実に役立ってくれる。","「とりあえず使ってみたい」という場合は、私が作成した上記のインストールスクリプトを仮想環境で試してみるのが良いと思う。\nその軽量さ故に、低スペックの仮想環境でも問題なく動作するはずである。","Ubuntu Server は本来サーバ用の OS であるため、動画を見ていると画面にちらつき(Tearing)が生じることがある。これを回避するためには、","\u002Fetc\u002FX11","下に以下のファイルを作成する。","intel-の場合","Intel の場合","ファイル名: 20-intel.conf\n","amd-の場合","AMD の場合","ファイル名: 20-amdgpu.conf\n","サーバ用なので当然だが、Ubuntu Server からは音が出ない。そのため、自分でサウンドシステムをインストールする必要がある。","Linux 用のサウンドシステムとしては PulseAudio がよく知られているが、私は ","https:\u002F\u002Fwiki.archlinux.jp\u002Findex.php\u002FPipeWire","PipeWire"," をインストールした。\nPipeWire は PulseAudio と互換性があり、AAC codec に対応しているなどのメリットがある。","Install PipeWire","🎄","Merry Christmas."))</script><script type="module" src="/_nuxt/entry.2589cd33.js" crossorigin></script><script type="module" src="/_nuxt/default.4a2fb377.js" crossorigin></script><script type="module" src="/_nuxt/menu.7a37b15a.js" crossorigin></script><script type="module" src="/_nuxt/header.e3f58f3f.js" crossorigin></script><script type="module" src="/_nuxt/index.e5798099.js" crossorigin></script><script type="module" src="/_nuxt/footer.d54dd6ca.js" crossorigin></script><script type="module" src="/_nuxt/ContentList.7226078a.js" crossorigin></script></body>
