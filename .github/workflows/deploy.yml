name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Format, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Astro assets
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('src/**', 'public/images/**', 'astro.config.ts') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & Format check
        run: bun run check:ci

      - name: Generate Astro types
        run: bunx astro sync

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Upload build artifact
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.actor == 'dependabot[bot]'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./out
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./out

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ./out
            --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
            ${{ github.actor == 'dependabot[bot]' && format('--branch=dependabot-{0}', github.event.number) || '' }}

      - name: Comment Preview URL on PR
        if: github.actor == 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Preview Deployment',
                '',
                `${{ steps.deploy.outputs.deployment-url }}`
              ].join('\n')
            })
