name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/ci.yml
    with:
      # Upload artifact if it's a push to main or a Dependabot PR that's not a patch update (since patch updates are auto-merged and don't need a deploy preview)
      upload-artifact: >-
        ${{
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.actor == 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/bun/patch'))
        }}

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: needs.build.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./out

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ./out
            --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
            ${{ github.actor == 'dependabot[bot]' && format('--branch=dependabot-{0}', github.event.number) || '' }}

      - name: Comment Preview URL on PR
        if: github.actor == 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Preview Deployment',
                '',
                `${{ steps.deploy.outputs.deployment-url }}`
              ].join('\n')
            })
