name: CI

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: false
    outputs:
      should-deploy:
        value: ${{ jobs.build.outputs.should-deploy }}

jobs:
  build:
    name: Lint & Format, Typecheck & Build
    outputs:
      should-deploy: ${{ inputs.upload-artifact }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4 # Astro CLI requires newer Node.js versions
        with:
          node-version: lts/*

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Astro assets
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('src/**', 'public/images/**', 'astro.config.ts') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & Format check
        run: bun run check:ci

      - name: Generate Astro types
        run: bunx astro sync

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Upload build artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./out
          retention-days: 1
